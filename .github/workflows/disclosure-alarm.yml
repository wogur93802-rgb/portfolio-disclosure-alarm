name: Portfolio disclosure alarm

on:
  schedule:
    - cron: "3-58/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portfolio-disclosure-alarm
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check disclosures and send Telegram alerts
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MEZZANINE_PORTFOLIO_BASE64: ${{ secrets.MEZZANINE_PORTFOLIO_BASE64 }}
        run: node actions/check-disclosures.js

      - name: Save notification state
        run: |
          if git diff --quiet -- actions/state.json actions/mezzanine-overrides.json; then
            echo "No state change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add actions/state.json actions/mezzanine-overrides.json
          git commit -m "chore: update disclosure notification state"
          git push
